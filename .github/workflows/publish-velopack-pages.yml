name: Publish Velopack Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 0.0.1589-ga2c5a97

      - name: Add .NET tools to PATH
        shell: pwsh
        run: |
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: npm install

      - name: Build Velopack release
        run: npm run build:win

      - name: Upload raw Velopack output
        uses: actions/upload-artifact@v4
        with:
          name: velopack-pages-site
          path: release/velopack
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Velopack output
        uses: actions/download-artifact@v4
        with:
          name: velopack-pages-site
          path: ./release-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./release-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

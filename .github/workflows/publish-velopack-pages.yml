name: Publish Velopack Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 0.0.1589-ga2c5a97

      - name: Add .NET tools to PATH
        shell: pwsh
        run: |
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install dependencies
        run: npm ci

      - name: Restore previous Velopack releases
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $baseUrl = 'https://sidomulyoadvertisingdev.github.io/POS-SIDOMULYO'
          $outputDir = Join-Path $PWD 'release/velopack'
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $metadataFiles = @('releases.win.json', 'RELEASES', 'assets.win.json')
          foreach ($name in $metadataFiles) {
            $url = "$baseUrl/$name"
            try {
              Invoke-WebRequest -Uri $url -OutFile (Join-Path $outputDir $name) -TimeoutSec 120
              Write-Host "Restored $name"
            } catch {
              Write-Warning "Skip restore ${name}: $($_.Exception.Message)"
            }
          }

          $releaseJsonPath = Join-Path $outputDir 'releases.win.json'
          if (-not (Test-Path $releaseJsonPath)) {
            Write-Host 'No existing releases.win.json found. Build will continue with fresh release metadata.'
            exit 0
          }

          $releaseJson = Get-Content $releaseJsonPath -Raw | ConvertFrom-Json
          $assetNames = @($releaseJson.Assets | ForEach-Object { $_.FileName } | Where-Object { $_ })

          foreach ($fileName in $assetNames) {
            $url = "$baseUrl/$fileName"
            $destination = Join-Path $outputDir $fileName
            try {
              Invoke-WebRequest -Uri $url -OutFile $destination -TimeoutSec 600
              Write-Host "Restored $fileName"
            } catch {
              Write-Warning "Skip restore ${fileName}: $($_.Exception.Message)"
            }
          }

      - name: Build GitHub Pages site
        run: npm run build:pages

      - name: Upload GitHub Pages site
        uses: actions/upload-artifact@v4
        with:
          name: velopack-pages-site
          path: release/pages-site
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Velopack output
        uses: actions/download-artifact@v4
        with:
          name: velopack-pages-site
          path: ./release-site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./release-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

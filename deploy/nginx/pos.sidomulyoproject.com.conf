server {
    listen 80;
    listen [::]:80;
    server_name pos.sidomulyoproject.com;

    root /var/www/pos.sidomulyoproject.com;
    index index.html;

    # Velopack metadata must be served as real files, not redirected to the SPA shell.
    location = /releases.win.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /RELEASES {
        add_header Cache-Control "no-cache";
        default_type text/plain;
        try_files $uri =404;
    }

    location = /assets.win.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Updater assets should always resolve directly.
    location ~* \.(nupkg|exe|zip|json)$ {
        try_files $uri =404;
    }

    # Static web assets
    location ~* \.(css|js|map|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|mp3)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SPA fallback for the Expo web app.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
